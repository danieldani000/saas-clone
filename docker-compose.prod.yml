services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-creative_ops}
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-creative_ops}
      REDIS_URL: redis://redis:6379
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      TEXT_PROVIDER: ${TEXT_PROVIDER:-openai}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-openai}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-kling}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      NANOBANANA_API_KEY: ${NANOBANANA_API_KEY:-}
      NANOBANANA_API_URL: ${NANOBANANA_API_URL:-}
      KLING_API_KEY: ${KLING_API_KEY:-}
      KLING_API_URL: ${KLING_API_URL:-}
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    command: sh -c "npm run db:push && node prisma/seed.ts && npm run start"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-creative_ops}
      REDIS_URL: redis://redis:6379
      TEXT_PROVIDER: ${TEXT_PROVIDER:-openai}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-openai}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-kling}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      NANOBANANA_API_KEY: ${NANOBANANA_API_KEY:-}
      NANOBANANA_API_URL: ${NANOBANANA_API_URL:-}
      KLING_API_KEY: ${KLING_API_KEY:-}
      KLING_API_URL: ${KLING_API_URL:-}
    depends_on:
      - postgres
      - redis
    command: sh -c "npm run db:push && npx tsx src/workers/agent-runner.ts"

volumes:
  pg_data:
